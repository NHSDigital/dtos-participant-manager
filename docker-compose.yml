services:
  ### ✅ Nginx ###
  nginx:
    container_name: "nginx"
    image: "nginx:latest"
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certificates:/etc/ssl/certs
      - ./certificates:/etc/ssl/private
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend

  ### ✅ Migrations ###
  migrations:
    container_name: "migrations"
    build:
      context: ./src/api/ParticipantManager.API
      dockerfile: Dockerfile.migrations
    environment:
      ConnectionStrings:ParticipantManagerDatabase: "Server=${DATABASE_HOST};Database=${DATABASE_NAME};User Id=${DATABASE_USER};Password=${DATABASE_PASSWORD};TrustServerCertificate=True"
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend

  ### ✅ SQL Database ###
  sqlserver:
    container_name: "participant_database"
    image: "mcr.microsoft.com/mssql/server:latest"
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DATABASE_PASSWORD}"
      MSSQL_PID: "Express"
    deploy:
      resources:
        limits:
          memory: "4g"
    ports:
      - "${DATABASE_PORT}:1433"
    healthcheck:
      # Test if the SQL server is available without using any credentials.
      test: timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1433'
    networks:
      - backend
    platform: linux/amd64

  ### ✅ API Backend (Azure Functions in .NET 9) ###
  api:
    container_name: "api-backend"
    build:
      context: ./src/api/ParticipantManager.API # Path to the API Dockerfile
      dockerfile: dev.Dockerfile
    platform: linux/amd64
    restart: always
    environment:
      FUNCTIONS_WORKER_RUNTIME: "dotnet-isolated"
      AzureWebJobsStorage: "${AZURE_WEB_JOBS_STORAGE}"
      AzureWebJobsSecretStorageType: "files" # looks for secrets under /azure-functions-host/Secrets/
      ConnectionStrings:ParticipantManagerDatabase: "Server=${DATABASE_HOST};Database=${DATABASE_NAME};User Id=${DATABASE_USER};Password=${DATABASE_PASSWORD};TrustServerCertificate=True"
    ports:
      - "${API_PORT}:80"
    networks:
      - backend

    ### ✅ Experience API (Azure Functions in .NET 9) ###
  experience-api:
    container_name: "experience-api"
    build:
      context: ./src/api/ParticipantManager.Experience.API # Path to the API Dockerfile
      dockerfile: dev.Dockerfile
    platform: linux/amd64
    restart: always
    environment:
      FUNCTIONS_WORKER_RUNTIME: "dotnet-isolated"
      AzureWebJobsStorage: "${AZURE_WEB_JOBS_STORAGE}"
      AzureWebJobsSecretStorageType: "files" # looks for secrets under /azure-functions-host/Secrets/
    ports:
      - "${EXPERIENCE_PORT}:80"
    networks:
      - backend

  ### ✅ Next.js Frontend ###
  frontend:
    container_name: "nextjs-frontend"
    build:
      context: ./src/web # Path to the Next.js project Dockerfile
      dockerfile: dev.Dockerfile
    develop:
      watch:
        - path: ./src/web
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/
    volumes:
      - ./src/web:/app:rw
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev
    restart: always
    platform: linux/amd64
    depends_on:
      - experience-api
    ports:
      - "${WEB_PORT}:3000"
    networks:
      - backend

networks:
  backend:
    driver: bridge
